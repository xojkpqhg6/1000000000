<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- teal Win95-Desktop als Hintergrund -->
  <rect width="64" height="64" rx="10" fill="#008080"/>
  <rect x="3.5" y="3.5" width="57" height="57" rx="8" fill="none" stroke="#004f4f" stroke-width="1"/>

  <!-- Stapel aus drei goldenen Batzen -->
  <g stroke-width="1.5">
    <!-- unten -->
    <rect x="12" y="40" width="40" height="12" rx="1.5" fill="#ffcb2b" stroke="#b8860b"/>
    <rect x="12" y="40" width="40" height="3" fill="#fff2b0"/>
    <!-- mitte -->
    <rect x="15" y="28" width="34" height="12" rx="1.5" fill="#ffcb2b" stroke="#b8860b"/>
    <rect x="15" y="28" width="34" height="3" fill="#fff2b0"/>
    <!-- oben mit €-Zeichen -->
    <rect x="18" y="16" width="28" height="12" rx="1.5" fill="#ffcb2b" stroke="#b8860b"/>
    <rect x="18" y="16" width="28" height="3" fill="#fff2b0"/>
    <text x="32" y="26" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
          font-size="12" font-weight="bold" fill="#4a3600">€</text>
  </g>
</svg>
